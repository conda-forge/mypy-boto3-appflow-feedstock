schema_version: 1

context:
  name: mypy-boto3-appflow
  version: "1.43.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 01a7b37454a81b426d59004e01dd5fde0521b69a4c2faf23f4dbde3d86e3b1d2

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=60
  run:
    - python >=${{ python_min }}
    - boto3
    # for all python to keep this noarch: python
    - typing_extensions

tests:
  - python:
      imports:
        - mypy_boto3_appflow
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Type annotations for boto3.Appflow 1.34.0 service generated with mypy-boto3-builder 7.21.0
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/youtype/mypy_boto3_builder
  repository: https://github.com/youtype/mypy_boto3_builder

extra:
  recipe-maintainers:
    - xylar
